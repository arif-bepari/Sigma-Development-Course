    <title>CSS position</title>
    <style>
      * {

      .box {

        background-color: blueviolet;

      }
      .box {
        height: 300px;
        width: 80vw;
        padding: 3px;
        margin: 3px;
        border: 2px solid black;
      }
      .parent{
        padding: 43px;

        border: 2px solid purple;
        /* position: absolute; */
