<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition Property</title>
    <style>
        .container{
            background-color: bisque;
            width: 50vw;
            height: 40vh;
        }
        .box{
            height:4vh;
            width: 5vw;
            background-color: aquamarine;
            /* transition-property:transform;
            transition-duration: 1s;
            transition-timing-function: cubic-bezier(0.11, 0.4, 0.86, 0.49);
            transition-delay: 1s; */
            transition: transform 1s cubic-bezier(0.11, 0.4, 0.86, 0.49) 1s;
        }
        .translet{
            transform: translateX(10vw) translateY(10vh);
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box translet"></div>
    </div>
</body>
</html>
