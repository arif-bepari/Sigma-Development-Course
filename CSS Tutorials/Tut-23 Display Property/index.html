<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            border: 2px solid black;
            display: inline-block;
            width: 200px;
            padding: 40px;
            margin: 20px;
        }
        .box1{
            /* display: none; */
            /* visibility: hidden; */
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="box box1">
        I am a box cc
    </div>
    <span>I am a span</span>
    <span>span2</span>
</body>
</html>
