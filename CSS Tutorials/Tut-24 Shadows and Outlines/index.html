<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shawos and Outlines</title>
    <style>
      .box {
        border: 2px solid black;
        padding: 20px;
        box-shadow: 4px 4px 7px 3px #b10b0b;
      }
      .ts{
        text-shadow: 4px 8px 4px #29ab94;
        /* outline: 2px solid red; */
        border: 2px solid rgb(8, 8, 8);
        /* outline-offset: 4px; */
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="box">This is a div box</div>
    <p class="ts">
      Lorem ipsum dolor sit, amet consectetur adipisicing elit. Dignissimos
      harum excepturi accusantium?
    </p>
  </body>
</html>
